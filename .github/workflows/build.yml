name: Build and Release with Nuitka (Manual)

on:
  workflow_dispatch:                      # 允许手动触发
    inputs:
      python_version:
        description: 'Python 版本 (例如 3.12, 3.11)'
        required: true
        default: '3.12'
      repo_url:
        description: 'GitHub 仓库地址或 "owner/repo" 格式 (例如 https://github.com/user/repo 或 user/repo)'
        required: true
      entry_point:
        description: '入口脚本文件 (相对于仓库根目录的路径)'
        required: true
        default: 'main.py'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: myapp-windows.exe
            nuitka_extra: --windows-console-mode=disable   # 可选：隐藏控制台窗口
          - os: ubuntu-22.04
            artifact_name: myapp-linux
            nuitka_extra: ''
          - os: macos-latest
            artifact_name: myapp-macos
            nuitka_extra: ''
      fail-fast: false                      # 一个平台失败不影响其他平台

    steps:
      - name: Parse repository input
        id: parse_repo
        run: |
          REPO_INPUT="${{ github.event.inputs.repo_url }}"
          # 如果输入是完整 URL，提取 owner/repo；否则直接使用输入
          if [[ "$REPO_INPUT" =~ github\.com[:/](.+)/(.+)\.git$ ]]; then
            OWNER_REPO="${BASH_REMATCH[1]}/${BASH_REMATCH[2]}"
          elif [[ "$REPO_INPUT" =~ ^https?://github\.com/(.+)/(.+)$ ]]; then
            OWNER_REPO="${BASH_REMATCH[1]}/${BASH_REMATCH[2]}"
          else
            OWNER_REPO="$REPO_INPUT"
          fi
          echo "owner_repo=$OWNER_REPO" >> $GITHUB_OUTPUT
        shell: bash

      - name: Checkout user repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.parse_repo.outputs.owner_repo }}
          # 对于公共仓库，无需 token；私有仓库需要配置 personal access token
          # token: ${{ secrets.USER_REPO_TOKEN }}   # 可选，按需添加

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python_version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping."
          fi

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone --onefile \
                 --output-filename=${{ matrix.artifact_name }} \
                 ${{ matrix.nuitka_extra }} \
                 --assume-yes-for-downloads \
                 ${{ github.event.inputs.entry_point }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}