name: Build with Nuitka

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python 版本 (例如 3.12, 3.11)'
        required: true
        default: '3.12'
      repo_url:
        description: 'GitHub 仓库地址或 "owner/repo" 格式 (例如 https://github.com/user/repo 或 user/repo)'
        required: true
      entry_point:
        description: '入口脚本文件 (相对于仓库根目录的路径)'
        required: true
        default: 'main.py'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: myapp-windows.exe
            nuitka_extra: --windows-console-mode=disable
          - os: ubuntu-22.04
            artifact_name: myapp-linux
            nuitka_extra: ''
          - os: macos-latest
            artifact_name: myapp-macos.app
            nuitka_extra: ''
      fail-fast: false

    steps:
      - name: Parse repository input
        id: parse_repo
        run: |
          REPO_INPUT="${{ github.event.inputs.repo_url }}"
          if [[ "$REPO_INPUT" =~ github\.com[:/](.+)/(.+)\.git$ ]]; then
            OWNER_REPO="${BASH_REMATCH[1]}/${BASH_REMATCH[2]}"
          elif [[ "$REPO_INPUT" =~ ^https?://github\.com/(.+)/(.+)$ ]]; then
            OWNER_REPO="${BASH_REMATCH[1]}/${BASH_REMATCH[2]}"
          else
            OWNER_REPO="$REPO_INPUT"
          fi
          echo "owner_repo=$OWNER_REPO" >> $GITHUB_OUTPUT
        shell: bash

      - name: Checkout user repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.parse_repo.outputs.owner_repo }}
          # 如需构建私有仓库，请在 Secrets 中添加 REPO_ACCESS_TOKEN 并取消下行注释
          # token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python_version }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping."
          fi

      - name: Build with Nuitka
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == macos-* ]]; then
            # macOS 使用 app bundle 模式（支持 Foundation 等框架）
            python -m nuitka --standalone --macos-create-app-bundle \
              --assume-yes-for-downloads \
              ${{ matrix.nuitka_extra }} \
              ${{ github.event.inputs.entry_point }}
            # 注意：不加 --output-filename，因为该参数对 app bundle 无效
          else
            # Windows / Linux 使用 onefile 可执行文件
            python -m nuitka --standalone --onefile \
              --output-filename=${{ matrix.artifact_name }} \
              ${{ matrix.nuitka_extra }} \
              --assume-yes-for-downloads \
              ${{ github.event.inputs.entry_point }}
          fi

      - name: Rename macOS app bundle to expected name
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # 获取实际生成的 .app 文件夹名称（入口脚本名）
          ENTRY_BASENAME=$(basename "${{ github.event.inputs.entry_point }}" .py)
          ACTUAL_APP="${ENTRY_BASENAME}.app"
          EXPECTED_APP="${{ matrix.artifact_name }}"
          if [ -d "$ACTUAL_APP" ]; then
            echo "Found $ACTUAL_APP, renaming to $EXPECTED_APP"
            mv "$ACTUAL_APP" "$EXPECTED_APP"
          else
            echo "ERROR: Expected app bundle '$ACTUAL_APP' not found!"
            ls -la
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}